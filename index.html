<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Екатерина Зыкова | Художница</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Marta&family=Baystar+Script&display=swap" rel="stylesheet">
    
    <style>
        /* ===== ПЕРЕМЕННЫЕ ===== */
        :root {
            --color-white: #ffffff;
            --color-ochre: #c9a86a;
            --color-gold: #d4af37;
            --color-dark: #1a1a1a;
            --color-blue-main: #3366cc;
            --color-blue-dark: #1a4a7a;
            --color-bg-light: #e8f4ff;
            --color-overlay: rgba(0, 0, 0, 0.4);
        }

        /* ===== БАЗОВЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Marta', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== SPLASH SCREEN ===== */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--color-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        .martini-loader svg {
            animation: fadeInOut 3s infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .splash-hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ===== НАВИГАЦИЯ ===== */
        .main-menu {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            background: rgba(26, 26, 26, 0.95);
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .main-menu ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
        }

        .main-menu a {
            color: var(--color-ochre);
            text-decoration: none;
            font-size: 1.1rem;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .main-menu a:hover,
        .main-menu a.active {
            color: var(--color-white);
            font-weight: bold;
            background: rgba(201, 168, 106, 0.2);
        }

        /* ===== СОДЕРЖИМОЕ СТРАНИЦ ===== */
        .page-section {
            display: none;
            min-height: 100vh;
            padding-top: 80px;
        }

        .page-section.active {
            display: block;
        }

        /* --- ГЛАВНАЯ СТРАНИЦА (белый текст) --- */
        #home-page {
            position: relative;
            color: var(--color-white);
        }

        #home-page .hero-section {
            position: relative;
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #home-page .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #home-page .full-bleed-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #home-page .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--color-overlay);
        }

        #home-page .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            padding: 2rem;
            text-align: center;
        }

        #home-page .main-title {
            font-family: 'Baystar Script', cursive;
            font-size: clamp(3rem, 8vw, 6rem);
            color: var(--color-white);
            margin-bottom: 2rem;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.7);
        }

        #home-page .hero-text p {
            font-size: clamp(1rem, 2vw, 1.3rem);
            margin-bottom: 1.5rem;
            line-height: 1.8;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.6);
        }

        #home-page .highlight {
            color: #fffacd;
            font-style: italic;
        }

        /* --- ОБО МНЕ / ВЫСТАВКА / КОНТАКТЫ (синий текст) --- */
        #about-page,
        #exhibition-page,
        #contacts-page {
            background-color: var(--color-bg-light);
            color: var(--color-blue-main);
        }

        #about-page h1,
        #exhibition-page h1,
        #contacts-page h1 {
            color: var(--color-blue-dark);
            font-family: 'Baystar Script', cursive;
            font-size: clamp(2.5rem, 6vw, 4rem);
            text-align: center;
            margin-bottom: 2rem;
        }

        #about-page p,
        #exhibition-page p,
        #contacts-page p {
            color: var(--color-blue-main);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .content-section {
            padding: 4rem 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        #about-page .artist-info {
            font-size: 1.2rem;
            color: var(--color-ochre);
            background: rgba(201, 168, 106, 0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        #about-page .exhibition-note {
            color: var(--color-gold);
            font-style: italic;
            margin-top: 2rem;
            background: rgba(212, 175, 55, 0.1);
            padding: 1rem;
            border-radius: 8px;
        }

        /* --- ГАЛЕРЕЯ ВЫСТАВКИ --- */
        #exhibition-page .exhibition-content {
            max-width: 1200px;
        }

        #exhibition-page .exhibition-title {
            margin-top: 4rem;
        }

        #exhibition-page .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        #exhibition-page .artwork {
            background: rgba(44, 90, 160, 0.15);
            border: 2px solid var(--color-blue-main);
            border-radius: 10px;
            padding: 1.5rem;
            transition: transform 0.3s ease;
        }

        #exhibition-page .artwork:hover {
            transform: translateY(-5px);
        }

        #exhibition-page .artwork-image img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1rem;
            filter: brightness(1.05) contrast(1.1);
        }

        #exhibition-page .artwork-description h3 {
            color: var(--color-blue-dark);
            margin-bottom: 0.5rem;
        }

        #exhibition-page .editable-desc {
            width: 100%;
            padding: 0.75rem;
            background: rgba(44, 90, 160, 0.9);
            border: 1px solid var(--color-blue-main);
            border-radius: 5px;
            color: var(--color-white) !important;
            resize: vertical;
            font-family: 'Marta', sans-serif;
            font-size: 1rem;
        }

        #exhibition-page .editable-desc::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* --- КОНТАКТЫ --- */
        #contacts-page .contact-link {
            font-size: 1.3rem;
            text-align: center;
            margin: 2rem 0;
        }

        #contacts-page .label {
            color: var(--color-blue-dark);
            font-weight: bold;
        }

        #contacts-page .tg-link {
            color: var(--color-ochre);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        #contacts-page .tg-link:hover {
            color: var(--color-blue-main);
            text-decoration: underline;
        }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 2rem;
            color: rgba(0, 0, 0, 0.6);
            font-size: 0.9rem;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        #home-page footer {
            color: rgba(255, 255, 255, 0.6);
        }

        .admin-stats {
            font-size: 0.75rem;
            color: var(--color-gold);
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
        }

        /* ===== АДАПТИВНОСТЬ ===== */
        @media (max-width: 768px) {
            .main-menu ul {
                gap: 1rem;
            }

            .main-menu a {
                font-size: 0.9rem;
                padding: 0.3rem 0.5rem;
            }

            .content-section {
                padding: 3rem 1rem;
            }

            #home-page .hero-content {
                padding: 1.5rem;
            }

            #exhibition-page .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

            <svg viewBox="0 0 100 150" width="120" height="180">
