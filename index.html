<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Каждая история начинается с легенды</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

height:100vh;
overflow:hidden;
font-family:Georgia, serif;

}


/* СЦЕНА */

.scene{

height:100vh;
width:100vw;

position:relative;

background:

linear-gradient(
rgba(255,255,255,.15),
rgba(0,0,0,.15)
),

#c7c7c5;

}


/* ГРАФФИТИ */

.graffiti{

position:absolute;

top:60px;
left:80px;

width:350px;
height:220px;

opacity:.7;

background:

radial-gradient(circle at 20% 30%, #ff4d6d 0 30px, transparent 31px),
radial-gradient(circle at 60% 40%, #00b4d8 0 45px, transparent 46px),
radial-gradient(circle at 40% 70%, #ffd60a 0 35px, transparent 36px),
radial-gradient(circle at 80% 60%, #8338ec 0 40px, transparent 41px);

filter:blur(.5px);

transform:rotate(-8deg);

}



/* МЕТАЛЛИЧЕСКАЯ СТОЙКА */

.counter{

position:absolute;

bottom:0;

width:100%;

height:180px;


background:

linear-gradient(
90deg,
#333,
#9b9b9b,
#555,
#b5b5b5,
#404040
);


box-shadow:

0 -15px 40px rgba(0,0,0,.35);


}


/* блик металла */

.counter:before{

content:"";

position:absolute;

top:20px;

left:0;

width:100%;

height:2px;

background:rgba(255,255,255,.5);

}



/* БОКАЛ МАРТИНИ */


.glass{

position:absolute;

bottom:170px;

left:50%;

transform:translateX(-50%);

width:170px;

height:220px;

z-index:5;

}



.bowl{

position:absolute;

width:170px;

height:110px;

border:3px solid rgba(255,255,255,.9);

border-radius:0 0 90px 90px;

overflow:hidden;

background:rgba(255,255,255,.08);

}



/* напиток */

.drink{

position:absolute;

bottom:0;

width:100%;

height:0;

background:

linear-gradient(
to top,
#f7f4ee,
#ffffff
);


animation:fill 4s forwards;


}



.stem{

position:absolute;

top:108px;

left:84px;

height:90px;

width:3px;

background:white;

}



.base{

position:absolute;

bottom:0;

left:45px;

width:80px;

height:3px;

background:white;

}




/* РУКА БАРМЕНА */

.hand{

position:absolute;

right:-250px;

top:38%;

width:360px;

height:90px;

background:

linear-gradient(
90deg,
#d39b75,
#f0b894
);


border-radius:

50px 0 0 50px;


transform:rotate(-12deg);


z-index:4;


animation:handMove 4s forwards;


}



/* шейкер */

.shaker{

position:absolute;

right:40px;

top:-40px;

width:80px;

height:35px;

background:silver;

border-radius:20px;

transform:rotate(-30deg);

}




/* ТЕКСТ */


.title{

position:absolute;

top:18%;

width:100%;

text-align:center;

color:#222;

font-size:38px;

letter-spacing:2px;


opacity:0;


animation:appear 2s forwards;

animation-delay:4s;


z-index:10;


}



/* АНИМАЦИИ */


@keyframes fill{

from{

height:0;

}

to{

height:85%;

}

}



@keyframes handMove{


0%{

right:-250px;

}


60%{

right:130px;

}


100%{

right:110px;

}


}



@keyframes appear{


from{

opacity:0;

transform:translateY(20px);

}


to{

opacity:1;

transform:translateY(0);

}


}


</style>

</head>


<body>


<div class="scene">


<div class="graffiti"></div>


<div class="hand">

<div class="shaker"></div>

</div>



<div class="glass">

<div class="bowl">

<div class="drink"></div>

</div>


<div class="stem"></div>

<div class="base"></div>


</div>



<div class="title">

Каждая история начинается с легенды.

</div>



<div class="counter"></div>



</div>


</body>

</html>
