<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Каждая история начинается с легенды</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d0d0d;
    overflow:hidden;
    font-family:Georgia, serif;
}

/* Фон бара */

.bar{
    position:relative;
    width:100vw;
    height:100vh;
    background:
    radial-gradient(circle at 50% 25%, rgba(255,210,140,.12), transparent 40%),
    linear-gradient(#171717,#090909);
}

/* Размытые бутылки */

.bottle{
    position:absolute;
    bottom:180px;
    width:35px;
    border-radius:12px 12px 4px 4px;
    background:#2d2d2d;
    filter:blur(1px);
    opacity:.45;
}

.b1{left:22%;height:130px;}
.b2{left:28%;height:160px;}
.b3{right:25%;height:145px;}
.b4{right:31%;height:170px;}

/* Металлическая стойка */

.counter{
    position:absolute;
    bottom:0;
    width:100%;
    height:180px;

    background:
    linear-gradient(
    to bottom,
    #5d5d5d,
    #a5a5a5 20%,
    #6e6e6e 40%,
    #3f3f3f 70%,
    #242424);
}

/* Бокал */

.glass{
    position:absolute;
    left:50%;
    bottom:150px;
    transform:translateX(-50%);
    width:110px;
    height:170px;
}

.bowl{
    position:absolute;
    width:110px;
    height:110px;
    border:2px solid rgba(255,255,255,.85);
    border-bottom:none;
    border-radius:0 0 55px 55px;
    overflow:hidden;
}

.stem{
    position:absolute;
    width:4px;
    height:55px;
    background:white;
    left:53px;
    top:110px;
}

.base{
    position:absolute;
    width:60px;
    height:2px;
    background:white;
    top:165px;
    left:25px;
}

/* Напиток */

.liquid{
    position:absolute;
    bottom:0;
    width:100%;
    height:0%;
    background:
    linear-gradient(
    to top,
    rgba(245,245,245,.95),
    rgba(255,255,255,.55)
    );

    animation:fill 4s ease forwards;
}

/* Надпись */

.text{

    position:absolute;
    width:100%;
    text-align:center;
    top:18%;

    color:white;

    font-size:34px;
    letter-spacing:2px;

    opacity:0;

    animation:show 2s forwards;
    animation-delay:3.8s;

}

.small{

    margin-top:18px;
    font-size:18px;
    color:#cfcfcf;
    letter-spacing:1px;

}

/* Анимации */

@keyframes fill{

0%{
height:0%;
}

100%{
height:88%;
}

}

@keyframes show{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="bar">

<div class="bottle b1"></div>
<div class="bottle b2"></div>
<div class="bottle b3"></div>
<div class="bottle b4"></div>

<div class="text">

Каждая история начинается с легенды.

<div class="small">

↓

</div>

</div>

<div class="glass">

<div class="bowl">

<div class="liquid"></div>

</div>

<div class="stem"></div>

<div class="base"></div>

</div>

<div class="counter"></div>

</div>

</body>
</html>
